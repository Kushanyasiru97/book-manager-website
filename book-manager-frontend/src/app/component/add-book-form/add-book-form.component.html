<div class="form-card">
  <div class="form-card-header">
    <span class="form-icon"></span>
    <div>
      <h2 class="form-title">{{ isEdit ? 'Edit Book' : 'Add New Book' }}</h2>
      <p class="form-subtitle">{{ isEdit ? 'Update the details below' : 'Fill in the book details below' }}</p>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="form-grid">

      <!-- Title -->
      <div class="field-group field-full">
        <label class="field-label" for="title">Title <span class="required">*</span></label>
        <input
          id="title"
          type="text"
          class="field-input"
          [class.invalid]="isInvalid('title')"
          formControlName="title"
          placeholder="e.g. The Great Gatsby"
          autocomplete="off">
        <span class="field-error" *ngIf="isInvalid('title')">Title is required.</span>
      </div>

      <!-- Author -->
      <div class="field-group field-full">
        <label class="field-label" for="author">Author <span class="required">*</span></label>
        <input
          id="author"
          type="text"
          class="field-input"
          [class.invalid]="isInvalid('author')"
          formControlName="author"
          placeholder="e.g. F. Scott Fitzgerald"
          autocomplete="off">
        <span class="field-error" *ngIf="isInvalid('author')">Author is required.</span>
      </div>

      <!-- ISBN -->
      <div class="field-group">
        <label class="field-label" for="isbn">ISBN <span class="required">*</span></label>
        <input
          id="isbn"
          type="text"
          class="field-input mono"
          [class.invalid]="isInvalid('isbn')"
          formControlName="isbn"
          placeholder="978-0000000000"
          autocomplete="off">
        <span class="field-error" *ngIf="isInvalid('isbn')">Enter a valid ISBN-10 or ISBN-13.</span>
      </div>

      <!-- Publication Date -->
      <div class="field-group">
        <label class="field-label" for="publicationDate">Publication Date <span class="required">*</span></label>
        <input
          id="publicationDate"
          type="date"
          class="field-input"
          [class.invalid]="isInvalid('publicationDate')"
          formControlName="publicationDate">
        <span class="field-error" *ngIf="isInvalid('publicationDate')">Publication date is required.</span>
      </div>

    </div><!-- /form-grid -->

    <!-- Submit error -->
    <div class="submit-error" *ngIf="submitError">⚠️ {{ submitError }}</div>

    <!-- Actions -->
    <div class="form-actions">
      <button type="button" class="btn btn-secondary" (click)="onCancel()">Cancel</button>
      <button type="submit" class="btn btn-primary" [disabled]="submitting">
        <span *ngIf="submitting" class="spinner"></span>
        {{ submitting ? 'Saving…' : (isEdit ? 'Update Book' : 'Add Book') }}
      </button>
    </div>
  </form>
</div>
